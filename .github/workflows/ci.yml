name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Race test
        run: make test-race

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: ./...

      - name: Vet
        run: make vet
